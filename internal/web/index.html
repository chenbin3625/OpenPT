<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenPT 监控面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f9fafb;
            --card: #ffffff;
            --text: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --hover: #f3f4f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        /* Header */
        header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .stat-value.danger { color: var(--danger); }

        /* Connection Status */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }

        .status-dot {
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background: var(--danger);
        }

        .status-dot.active {
            background: var(--success);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Card */
        .card {
            background: var(--card);
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            margin-top: 1.5rem;
            overflow: hidden;
        }

        .card-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }

        /* Buttons */
        button {
            border: none;
            cursor: pointer;
            font: inherit;
            transition: all 0.2s;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-secondary {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--hover);
        }

        .btn-secondary.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-icon {
            padding: 0.5rem;
            background: none;
            color: var(--text-muted);
        }

        .btn-icon:hover {
            color: var(--text);
            background: var(--hover);
            border-radius: 0.375rem;
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.125rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 0.25rem;
        }

        .badge.danger {
            background: #fee2e2;
            color: var(--danger);
        }

        /* Input */
        input[type="text"] {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            font: inherit;
            font-size: 0.875rem;
            width: 200px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--hover);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        th:hover {
            background: var(--border);
        }

        th.sortable::after {
            content: ' ⇅';
            opacity: 0.3;
        }

        th.sorted-asc::after {
            content: ' ↑';
            opacity: 1;
        }

        th.sorted-desc::after {
            content: ' ↓';
            opacity: 1;
        }

        td {
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.875rem;
        }

        tr:hover td {
            background: var(--hover);
        }

        tr.issue td {
            background: #fef2f2;
        }

        tr.issue:hover td {
            background: #fee2e2;
        }

        .text-right {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .text-mono {
            font-family: 'SF Mono', Consolas, monospace;
            font-size: 0.8125rem;
            color: var(--text-muted);
        }

        .text-truncate {
            max-width: 350px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .text-success { color: var(--success); font-weight: 500; }
        .text-warning { color: var(--warning); font-weight: 500; }
        .text-danger { color: var(--danger); font-weight: 500; }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.8125rem;
            font-weight: 500;
        }

        .status-badge.ok {
            background: #d1fae5;
            color: var(--success);
        }

        .status-badge.warning {
            background: #fef3c7;
            color: var(--warning);
        }

        .status-badge.error {
            background: #fee2e2;
            color: var(--danger);
        }

        .status-icon {
            width: 0.875rem;
            height: 0.875rem;
        }

        /* Empty State */
        .empty {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-icon {
            width: 3rem;
            height: 3rem;
            margin: 0 auto 1rem;
            opacity: 0.4;
        }

        .empty h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .empty p {
            font-size: 0.875rem;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card);
            border-radius: 0.75rem;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
        }

        .config-row {
            display: grid;
            grid-template-columns: 2fr 3fr;
            gap: 1rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        .config-row:last-child {
            border-bottom: none;
        }

        .config-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .config-value {
            font-weight: 600;
            word-break: break-word;
        }

        /* Icon */
        svg {
            width: 1rem;
            height: 1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
            }

            input[type="text"] {
                width: 100%;
            }

            .text-mono,
            .tracker {
                display: none;
            }

            .config-row {
                grid-template-columns: 1fr;
                gap: 0.25rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>OpenPT 监控面板</h1>
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">活跃种子</span>
                    <span class="stat-value" id="active">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">异常种子</span>
                    <span class="stat-value" id="issues">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">上传速度</span>
                    <span class="stat-value text-success" id="speed">0 B/s</span>
                </div>
                <div class="stat">
                    <span class="stat-label">总上传量</span>
                    <span class="stat-value" id="uploaded">0 B</span>
                </div>
                <div class="stat">
                    <span class="stat-label">状态</span>
                    <span class="status">
                        <span class="status-dot" id="dot"></span>
                        <span id="status-text">连接中...</span>
                    </span>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <div class="card-header">
                <span class="card-title">种子列表</span>
                <div class="toolbar">
                    <button class="btn btn-secondary active" data-filter="all">全部</button>
                    <button class="btn btn-secondary" data-filter="issue">
                        异常<span class="badge danger" id="badge">0</span>
                    </button>
                    <button class="btn btn-secondary" data-filter="ok">正常</button>
                    <button class="btn-icon" id="config-btn" title="查看配置">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </button>
                    <input type="text" id="search" placeholder="搜索种子...">
                </div>
            </div>
            <div id="table-wrapper" class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="info_hash">Info Hash</th>
                            <th class="sortable" data-sort="name">名称</th>
                            <th class="sortable text-right" data-sort="size">大小</th>
                            <th class="sortable text-right" data-sort="uploaded">已上传</th>
                            <th class="sortable text-right" data-sort="speed_bps">速度</th>
                            <th class="sortable text-right" data-sort="seeders">做种</th>
                            <th class="sortable text-right" data-sort="leechers">下载</th>
                            <th class="sortable text-right" data-sort="ratio">分享率</th>
                            <th class="sortable text-right" data-sort="failures">状态</th>
                            <th class="sortable tracker" data-sort="tracker_host">Tracker</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div id="empty" class="empty" style="display: none;">
                <svg class="empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"/>
                </svg>
                <h3 id="empty-title">暂无种子</h3>
                <p id="empty-desc">请将 .torrent 文件放入 torrents 目录</p>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">当前配置</span>
                <button class="btn-icon" id="close">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="config"></div>
        </div>
    </div>

    <script>
    let data = [];
    let sortKey = 'name';
    let sortAsc = true;
    let filter = 'all';
    let query = '';
    let es = null;

    const fmt = {
        bytes: n => {
            if (n === 0) return '0 B';
            const u = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(n) / Math.log(1024));
            return (n / Math.pow(1024, i)).toFixed(2) + ' ' + u[i];
        },
        speed: n => fmt.bytes(n) + '/s',
        ratio: n => n.toFixed(3)
    };

    const esc = s => {
        const div = document.createElement('div');
        div.textContent = String(s || '');
        return div.innerHTML;
    };

    const render = () => {
        let filtered = data.filter(t => {
            if (query && !t.name.toLowerCase().includes(query.toLowerCase())) return false;
            if (filter === 'issue') return t.has_issue;
            if (filter === 'ok') return !t.has_issue;
            return true;
        });

        filtered.sort((a, b) => {
            let va = a[sortKey], vb = b[sortKey];
            if (typeof va === 'string') {
                va = va.toLowerCase();
                vb = vb.toLowerCase();
            }
            return (va < vb ? -1 : va > vb ? 1 : 0) * (sortAsc ? 1 : -1);
        });

        const tbody = document.getElementById('tbody');
        const empty = document.getElementById('empty');
        const wrapper = document.getElementById('table-wrapper');

        if (filtered.length === 0) {
            wrapper.style.display = 'none';
            empty.style.display = 'block';
            const title = document.getElementById('empty-title');
            const desc = document.getElementById('empty-desc');
            if (filter === 'issue') {
                title.textContent = '没有异常种子';
                desc.textContent = '所有种子运行正常';
            } else if (filter === 'ok') {
                title.textContent = '没有正常种子';
                desc.textContent = '所有种子都存在异常';
            } else if (query) {
                title.textContent = '未找到匹配';
                desc.textContent = '尝试其他关键词';
            } else {
                title.textContent = '暂无种子';
                desc.textContent = '请将 .torrent 文件放入 torrents 目录';
            }
            return;
        }

        wrapper.style.display = 'block';
        empty.style.display = 'none';

        tbody.innerHTML = filtered.map(t => {
            const ratioClass = t.ratio >= 1 ? 'text-success' : t.ratio >= 0.5 ? 'text-warning' : 'text-danger';
            const statusClass = t.has_issue ? (t.failures > 0 ? 'error' : 'warning') : 'ok';
            const statusText = t.has_issue ? (t.issue_reason || '异常') : '正常';
            const icon = `<svg class="status-icon" fill="currentColor" viewBox="0 0 20 20">
                ${t.has_issue
                    ? '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>'
                    : '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>'}
            </svg>`;

            return `<tr class="${t.has_issue ? 'issue' : ''}">
                <td class="text-mono" title="${esc(t.info_hash)}">${esc(t.info_hash.slice(0, 16))}...</td>
                <td class="text-truncate" title="${esc(t.name)}">${esc(t.name)}</td>
                <td class="text-right">${fmt.bytes(t.size)}</td>
                <td class="text-right">${fmt.bytes(t.uploaded)}</td>
                <td class="text-right text-success">${fmt.speed(t.speed_bps)}</td>
                <td class="text-right">${t.seeders}</td>
                <td class="text-right">${t.leechers}</td>
                <td class="text-right ${ratioClass}">${fmt.ratio(t.ratio)}</td>
                <td class="text-right">
                    <span class="status-badge ${statusClass}" title="${esc(t.issue_reason || '')}">
                        ${icon}${esc(statusText)}
                    </span>
                </td>
                <td class="tracker" title="${esc(t.tracker_host)}">${esc(t.tracker_host)}</td>
            </tr>`;
        }).join('');
    };

    const update = resp => {
        data = resp.torrents || [];
        const issues = data.filter(t => t.has_issue).length;
        const totalSpeed = data.reduce((s, t) => s + t.speed_bps, 0);
        const totalUploaded = data.reduce((s, t) => s + t.uploaded, 0);

        document.getElementById('active').textContent = data.length;
        document.getElementById('issues').textContent = issues;
        document.getElementById('issues').className = 'stat-value' + (issues > 0 ? ' danger' : '');
        document.getElementById('speed').textContent = fmt.speed(totalSpeed);
        document.getElementById('uploaded').textContent = fmt.bytes(totalUploaded);
        document.getElementById('badge').textContent = issues;

        render();
    };

    const connect = () => {
        if (es) es.close();
        es = new EventSource('/api/events');

        es.onopen = () => {
            document.getElementById('dot').classList.add('active');
            document.getElementById('status-text').textContent = '已连接';
        };

        es.onmessage = e => {
            try {
                update(JSON.parse(e.data));
            } catch (err) {
                console.error(err);
            }
        };

        es.onerror = () => {
            document.getElementById('dot').classList.remove('active');
            document.getElementById('status-text').textContent = '重连中...';
        };
    };

    const loadConfig = async () => {
        try {
            const res = await fetch('/api/config');
            const json = await res.json();
            document.getElementById('config').innerHTML = json.items.map(item =>
                `<div class="config-row">
                    <div class="config-label">${esc(item.label)}</div>
                    <div class="config-value">${esc(item.value)}</div>
                </div>`
            ).join('');
        } catch (err) {
            console.error(err);
        }
    };

    // Event listeners
    document.querySelectorAll('[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filter = btn.dataset.filter;
            render();
        });
    });

    document.querySelectorAll('[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
            const key = th.dataset.sort;
            if (sortKey === key) {
                sortAsc = !sortAsc;
            } else {
                sortKey = key;
                sortAsc = true;
            }
            document.querySelectorAll('th').forEach(t => t.classList.remove('sorted-asc', 'sorted-desc'));
            th.classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');
            render();
        });
    });

    document.getElementById('search').addEventListener('input', e => {
        query = e.target.value;
        render();
    });

    document.getElementById('config-btn').addEventListener('click', () => {
        loadConfig();
        document.getElementById('modal').classList.add('active');
    });

    document.getElementById('close').addEventListener('click', () => {
        document.getElementById('modal').classList.remove('active');
    });

    document.getElementById('modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) {
            e.currentTarget.classList.remove('active');
        }
    });

    // Init
    connect();
    </script>
</body>
</html>
