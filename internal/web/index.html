<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>OpenPT 监控面板</title>
    <link rel="icon" href="/openpt-icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css?v=1">
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="header-brand">
                <img src="/openpt-icon.svg" width="28" height="28" alt="">
                <h1>OpenPT 监控面板</h1>
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-icon seeds">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5m6 4.125l2.25 2.25m0 0l2.25 2.25M12 13.875l2.25-2.25M12 13.875l-2.25 2.25M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span class="stat-label">活跃种子</span>
                        <span class="stat-value" id="active">0</span>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-icon issues">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span class="stat-label">异常种子</span>
                        <span class="stat-value" id="issues">0</span>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-icon speed">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span class="stat-label">上传速度</span>
                        <span class="stat-value highlight-success" id="speed">0 B/s</span>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-icon upload">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span class="stat-label">总上传量</span>
                        <span class="stat-value" id="uploaded">0 B</span>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-icon clock">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span class="stat-label">下次上报</span>
                        <span class="stat-value" id="next-report">暂无</span>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-icon status" id="status-icon">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1012.728 0M12 3v4.5"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span class="stat-label">状态</span>
                        <div class="stat-status-row">
                            <span class="status-dot" id="dot"></span>
                            <span class="stat-value connection-value" id="status-text">连接中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="card">
            <div class="card-header">
                <span class="card-title">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z"/>
                    </svg>
                    种子列表
                    <span class="count" id="list-count">0 个</span>
                </span>
                <div class="toolbar">
                    <button class="btn btn-secondary active" data-filter="all">全部</button>
                    <button class="btn btn-secondary" data-filter="issue">
                        异常<span class="badge danger" id="badge">0</span>
                    </button>
                    <button class="btn btn-secondary" data-filter="ok">正常</button>
                    <button class="btn-icon" id="config-btn" title="查看配置">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </button>
                    <label class="search-wrap" for="search">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
                        </svg>
                        <input type="text" id="search" placeholder="搜索种子...">
                    </label>
                </div>
            </div>
            <div id="table-wrapper" class="table-wrapper">
                <table>
                    <colgroup>
                        <col class="col-name">
                        <col class="col-status">
                        <col class="col-speed">
                        <col class="col-uploaded">
                        <col class="col-size">
                        <col class="col-peers">
                        <col class="col-ratio">
                        <col class="col-next">
                        <col class="col-interval optional-col">
                        <col class="col-tracker tracker">
                        <col class="col-hash hash-col">
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="name">名称</th>
                            <th class="sortable text-right" data-sort="failures">状态</th>
                            <th class="sortable text-right" data-sort="speed_bps">速度</th>
                            <th class="sortable text-right" data-sort="uploaded">已上传</th>
                            <th class="sortable text-right" data-sort="size">大小</th>
                            <th class="sortable text-right" data-sort="peers_total">Peers</th>
                            <th class="sortable text-right" data-sort="ratio">分享率</th>
                            <th class="sortable text-right" data-sort="next_announce_ts">下次上报</th>
                            <th class="sortable text-right optional-col" data-sort="last_interval_seconds">间隔</th>
                            <th class="sortable tracker" data-sort="tracker_host">Tracker</th>
                            <th class="sortable hash-col" data-sort="info_hash">Info Hash</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div id="empty" class="empty" hidden>
                <svg class="empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"/>
                </svg>
                <h3 id="empty-title">暂无种子</h3>
                <p id="empty-desc">请将 .torrent 文件放入 torrents 目录</p>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modal-title">当前配置</span>
                <button class="btn-icon" id="close" title="关闭">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="config"></div>
        </div>
    </div>

    <script>
    let data = [];
    let sortKey = 'name';
    let sortAsc = true;
    let filter = 'all';
    let query = '';
    let es = null;
    const rowCache = new Map();

    const fmt = {
        bytes: n => {
            n = Number(n || 0);
            if (n === 0) return '0 B';
            const u = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(n) / Math.log(1024));
            return (n / Math.pow(1024, i)).toFixed(2) + ' ' + u[i];
        },
        speed: n => fmt.bytes(n) + '/s',
        ratio: n => Number(n || 0).toFixed(3),
        time: s => {
            if (!s) return '未上报';
            const d = new Date(s);
            if (Number.isNaN(d.getTime())) return '未知';
            return d.toLocaleString('zh-CN', { hour12: false });
        },
        relative: s => {
            if (!s) return '暂无';
            const d = new Date(s);
            if (Number.isNaN(d.getTime())) return '未知';
            const diff = d.getTime() - Date.now();
            const abs = Math.abs(diff);
            const sec = Math.round(abs / 1000);
            const min = Math.round(sec / 60);
            const hour = Math.round(min / 60);
            const text = hour >= 1 ? hour + ' 小时' : min >= 1 ? min + ' 分钟' : sec + ' 秒';
            return diff >= 0 ? text + '后' : text + '前';
        },
        duration: seconds => {
            seconds = Number(seconds || 0);
            if (seconds <= 0) return '-';
            if (seconds < 60) return seconds + ' 秒';
            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            if (min < 60) return sec ? min + ' 分 ' + sec + ' 秒' : min + ' 分';
            const hour = Math.floor(min / 60);
            const rest = min % 60;
            return rest ? hour + ' 小时 ' + rest + ' 分' : hour + ' 小时';
        },
        event: event => {
            if (event === 'started') return '启动上报';
            if (event === 'stopped') return '停止上报';
            if (event === 'completed') return '完成上报';
            return '常规上报';
        }
    };

    const escMap = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
    const esc = s => String(s ?? '').replace(/[&<>"']/g, c => escMap[c]);

    // 速度颜色分级
    const speedClass = bps => {
        if (bps <= 0) return 'zero';
        if (bps < 10240) return 'low';
        if (bps < 102400) return 'mid';
        return 'high';
    };

    // 分享率颜色和进度条分级
    const ratioGrade = r => {
        if (r >= 1) return { cls: 'high', pct: Math.min(100, (r / 2) * 100) };
        if (r >= 0.5) return { cls: 'mid', pct: Math.min(100, r * 100) };
        return { cls: 'low', pct: Math.max(0, r * 100) };
    };

    const compareRows = (a, b) => {
        let va = a[sortKey] ?? '', vb = b[sortKey] ?? '';
        if (typeof va === 'string') {
            va = va.toLowerCase();
            vb = String(vb).toLowerCase();
        }
        const primary = va < vb ? -1 : va > vb ? 1 : 0;
        if (primary !== 0) return primary * (sortAsc ? 1 : -1);

        const nameA = String(a.name || '').toLowerCase();
        const nameB = String(b.name || '').toLowerCase();
        if (nameA !== nameB) return nameA < nameB ? -1 : 1;
        return String(a.info_hash || '').localeCompare(String(b.info_hash || ''));
    };

    const relativeBucket = iso => {
        if (!iso) return 0;
        const diff = Math.abs(new Date(iso).getTime() - Date.now());
        if (diff < 60000) return Math.floor(Date.now() / 1000);
        if (diff < 3600000) return Math.floor(Date.now() / 60000);
        return Math.floor(Date.now() / 3600000);
    };

    const rowSignature = t => [
        t.has_issue, t.failures, t.speed_bps, t.uploaded, t.size,
        t.seeders, t.leechers, t.ratio, t.next_announce_at, t.last_announce_at,
        t.last_interval_seconds, t.retry_in_seconds,
        t.tracker_host, t.tracker_index, t.tracker_count,
        t.next_event, t.issue_reason, t.last_error, t.name, t.info_hash,
        relativeBucket(t.next_announce_at), relativeBucket(t.last_announce_at)
    ].join('\0');

    const rowHTML = t => {
        const ratioInfo = ratioGrade(t.ratio);
        const speedCls = speedClass(t.speed_bps);
        const statusClass = t.has_issue ? (t.failures > 0 ? 'error' : 'warning') : 'ok';
        const peersTotal = (t.seeders || 0) + (t.leechers || 0);
        const trackerOrdinal = t.tracker_count > 0 ? ((t.tracker_index || 0) + 1) + '/' + t.tracker_count : '-';

        let statusText = '正常';
        let statusHint = '最近一次 Tracker 响应正常';

        if (t.has_issue) {
            if (t.failures > 0) {
                statusText = '失败 ' + t.failures;
                statusHint = t.issue_reason || '连续失败 ' + t.failures + ' 次';
            } else {
                statusText = '异常';
                statusHint = t.issue_reason || '异常';
            }
        }

        const detailRows = [
            '状态：' + statusHint,
            '上次上报：' + fmt.time(t.last_announce_at) + '（' + fmt.relative(t.last_announce_at) + '）',
            '下次上报：' + fmt.time(t.next_announce_at) + '（' + fmt.relative(t.next_announce_at) + '）',
            '上报类型：' + fmt.event(t.next_event) + '，间隔：' + fmt.duration(t.last_interval_seconds),
            'Tracker：' + (t.tracker_host || '-') + '（' + trackerOrdinal + '）',
            'Peers：做种 ' + (t.seeders || 0) + ' / 下载 ' + (t.leechers || 0)
        ];

        const icon = '<svg class="status-icon" fill="currentColor" viewBox="0 0 20 20">'
            + (t.has_issue
                ? '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>'
                : '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>')
            + '</svg>';

        return '<td class="name-cell" title="' + esc(t.name) + '">'
                + '<span class="primary-text">' + esc(t.name) + '</span>'
                + '<span class="subtext">Tracker ' + esc(trackerOrdinal) + ' &middot; ' + esc(fmt.event(t.next_event)) + '</span>'
            + '</td>'
            + '<td class="text-right">'
                + '<span class="status-cell">'
                    + '<span class="status-badge ' + statusClass + '">'
                        + icon + esc(statusText)
                    + '</span>'
                    + '<span class="subtext">' + esc(t.failures > 0 ? '重试 ' + fmt.relative(t.next_announce_at) : fmt.event(t.next_event)) + '</span>'
                    + '<span class="status-detail">'
                        + '<span class="status-detail-title">' + esc(t.name) + '</span>'
                        + detailRows.map(row => '<span class="status-detail-line">' + esc(row) + '</span>').join('')
                        + (t.last_error ? '<span class="status-detail-error">' + esc(t.last_error) + '</span>' : '')
                    + '</span>'
                + '</span>'
            + '</td>'
            + '<td class="text-right"><span class="speed-value ' + speedCls + '">' + fmt.speed(t.speed_bps) + '</span></td>'
            + '<td class="text-right">' + fmt.bytes(t.uploaded) + '</td>'
            + '<td class="text-right">' + fmt.bytes(t.size) + '</td>'
            + '<td class="text-right">'
                + '<span class="metric">'
                    + '<span>' + peersTotal + '</span>'
                    + '<span class="subtext">S ' + (t.seeders || 0) + ' / L ' + (t.leechers || 0) + '</span>'
                + '</span>'
            + '</td>'
            + '<td class="text-right">'
                + '<div class="ratio-cell">'
                    + '<div class="ratio-bar-wrap"><div class="ratio-bar-fill ' + ratioInfo.cls + '" style="width:' + ratioInfo.pct + '%"></div></div>'
                    + '<span class="ratio-value ' + ratioInfo.cls + '">' + fmt.ratio(t.ratio) + '</span>'
                + '</div>'
            + '</td>'
            + '<td class="text-right">'
                + '<span class="metric">'
                    + '<span class="nowrap">' + esc(fmt.relative(t.next_announce_at)) + '</span>'
                    + '<span class="subtext">' + esc(fmt.time(t.next_announce_at)) + '</span>'
                + '</span>'
            + '</td>'
            + '<td class="text-right optional-col">' + esc(fmt.duration(t.last_interval_seconds)) + '</td>'
            + '<td class="tracker" title="' + esc(t.tracker_host) + '">'
                + '<span class="primary-text">' + esc(t.tracker_host || '-') + '</span>'
                + '<span class="subtext">' + esc(trackerOrdinal) + '</span>'
            + '</td>'
            + '<td class="text-mono hash-col" title="' + esc(t.info_hash) + '">'
                + '<span class="primary-text">' + esc(t.info_hash.slice(0, 16)) + '...</span>'
            + '</td>';
    };

    const render = () => {
        const keyword = query.toLowerCase();
        let filtered = data.filter(t => {
            if (keyword) {
                const haystack = (t.name + ' ' + t.info_hash + ' ' + t.tracker_host + ' ' + t.issue_reason).toLowerCase();
                if (!haystack.includes(keyword)) return false;
            }
            if (filter === 'issue') return t.has_issue;
            if (filter === 'ok') return !t.has_issue;
            return true;
        });

        filtered.sort(compareRows);

        const tbody = document.getElementById('tbody');
        const empty = document.getElementById('empty');
        const wrapper = document.getElementById('table-wrapper');
        const listCount = document.getElementById('list-count');

        if (filtered.length === 0) {
            wrapper.hidden = true;
            empty.hidden = false;
            listCount.textContent = '0 个';
            rowCache.forEach(row => row.remove());
            rowCache.clear();
            const title = document.getElementById('empty-title');
            const desc = document.getElementById('empty-desc');
            if (filter === 'issue') {
                title.textContent = '没有异常种子';
                desc.textContent = '所有种子运行正常';
            } else if (filter === 'ok') {
                title.textContent = '没有正常种子';
                desc.textContent = '所有种子都存在异常';
            } else if (query) {
                title.textContent = '未找到匹配';
                desc.textContent = '尝试其他关键词';
            } else {
                title.textContent = '暂无种子';
                desc.textContent = '请将 .torrent 文件放入 torrents 目录';
            }
            return;
        }

        wrapper.hidden = false;
        empty.hidden = true;
        listCount.textContent = filtered.length + ' 个';

        const visibleHashes = new Set();
        filtered.forEach(t => {
            visibleHashes.add(t.info_hash);
            let row = rowCache.get(t.info_hash);
            if (!row) {
                row = document.createElement('tr');
                row.dataset.hash = t.info_hash;
                rowCache.set(t.info_hash, row);
            }

            row.className = t.has_issue ? 'issue' : '';
            const signature = rowSignature(t);
            if (row.dataset.sig !== signature) {
                row.innerHTML = rowHTML(t);
                row.dataset.sig = signature;
            }
            tbody.appendChild(row);
        });

        rowCache.forEach((row, hash) => {
            if (!visibleHashes.has(hash)) {
                row.remove();
                rowCache.delete(hash);
            }
        });
    };

    const update = resp => {
        let issues = 0;
        let totalSpeed = 0;
        let totalUploaded = 0;
        let nextTs = Number.MAX_SAFE_INTEGER;

        data = (resp.torrents || []).map(t => {
            const nextAnnounceTs = t.next_announce_at ? new Date(t.next_announce_at).getTime() : Number.MAX_SAFE_INTEGER;
            if (t.has_issue) issues++;
            totalSpeed += t.speed_bps || 0;
            totalUploaded += t.uploaded || 0;
            nextTs = Math.min(nextTs, nextAnnounceTs);
            return {
                ...t,
                peers_total: (t.seeders || 0) + (t.leechers || 0),
                last_announce_ts: t.last_announce_at ? new Date(t.last_announce_at).getTime() : 0,
                next_announce_ts: nextAnnounceTs
            };
        });

        document.getElementById('active').textContent = data.length;
        const issuesEl = document.getElementById('issues');
        issuesEl.textContent = issues;
        issuesEl.className = 'stat-value' + (issues > 0 ? ' highlight-danger' : '');
        document.getElementById('speed').textContent = fmt.speed(totalSpeed);
        document.getElementById('uploaded').textContent = fmt.bytes(totalUploaded);
        document.getElementById('next-report').textContent = nextTs === Number.MAX_SAFE_INTEGER ? '暂无' : fmt.relative(new Date(nextTs).toISOString());
        document.getElementById('badge').textContent = issues;

        render();
    };

    const connect = () => {
        if (es) es.close();
        es = new EventSource('/api/events');

        es.onopen = () => {
            document.getElementById('dot').classList.add('active');
            document.getElementById('status-text').textContent = '已连接';
            const iconEl = document.getElementById('status-icon');
            if (iconEl) iconEl.className = 'stat-icon status-active';
        };

        es.onmessage = e => {
            try {
                update(JSON.parse(e.data));
            } catch (err) {
                console.error(err);
            }
        };

        es.onerror = () => {
            document.getElementById('dot').classList.remove('active');
            document.getElementById('status-text').textContent = '重连中...';
            const iconEl = document.getElementById('status-icon');
            if (iconEl) iconEl.className = 'stat-icon status';
        };
    };

    const loadConfig = async () => {
        try {
            const res = await fetch('/api/config');
            const json = await res.json();
            document.getElementById('config').innerHTML = json.items.map(item =>
                '<div class="config-row">'
                    + '<div class="config-label">' + esc(item.label) + '</div>'
                    + '<div class="config-value">' + esc(item.value) + '</div>'
                + '</div>'
            ).join('');
        } catch (err) {
            console.error(err);
        }
    };

    // Event listeners
    document.querySelectorAll('[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filter = btn.dataset.filter;
            render();
        });
    });

    document.querySelectorAll('[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
            const key = th.dataset.sort;
            if (sortKey === key) {
                sortAsc = !sortAsc;
            } else {
                sortKey = key;
                sortAsc = true;
            }
            document.querySelectorAll('th').forEach(t => t.classList.remove('sorted-asc', 'sorted-desc'));
            th.classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');
            render();
        });
    });

    document.getElementById('search').addEventListener('input', e => {
        query = e.target.value;
        render();
    });

    document.getElementById('config-btn').addEventListener('click', () => {
        loadConfig();
        document.getElementById('modal').classList.add('active');
    });

    document.getElementById('close').addEventListener('click', () => {
        document.getElementById('modal').classList.remove('active');
    });

    document.getElementById('modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) {
            e.currentTarget.classList.remove('active');
        }
    });

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            document.getElementById('modal').classList.remove('active');
        }
    });

    // Init
    connect();
    </script>
</body>
</html>
