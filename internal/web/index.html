<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenPT 监控面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --success: #059669;
            --success-light: #ecfdf5;
            --warning: #d97706;
            --warning-light: #fffbeb;
            --danger: #dc2626;
            --danger-light: #fef2f2;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-secondary: #334155;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --hover: #f8fafc;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== Header ========== */
        header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 0.625rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .container {
            max-width: 1680px;
            margin: 0 auto;
            padding: 0 1.25rem;
        }

        .header-container {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .header-brand svg {
            width: 1.25rem;
            height: 1.25rem;
            color: var(--primary);
        }

        h1 {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            white-space: nowrap;
            color: var(--text);
        }

        .main-container {
            width: 100%;
            padding: 0.75rem 1rem 1rem;
        }

        /* ========== Stats Grid ========== */
        .stats {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 0.5rem;
            flex: 1;
            min-width: 0;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.625rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            background: var(--card);
            transition: border-color 0.15s, box-shadow 0.15s;
            min-width: 0;
        }

        .stat:hover {
            border-color: #cbd5e1;
            box-shadow: var(--shadow);
        }

        .stat-icon {
            flex-shrink: 0;
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon svg {
            width: 1rem;
            height: 1rem;
        }

        .stat-icon.seeds   { background: #dbeafe; color: var(--primary); }
        .stat-icon.issues  { background: #fee2e2; color: var(--danger); }
        .stat-icon.speed   { background: #d1fae5; color: var(--success); }
        .stat-icon.upload  { background: #e0e7ff; color: #4f46e5; }
        .stat-icon.clock   { background: #fef3c7; color: var(--warning); }
        .stat-icon.status  { background: #f1f5f9; color: var(--text-muted); }
        .stat-icon.status-active { background: #d1fae5; color: var(--success); }

        .stat-body {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 0.0625rem;
        }

        .stat-label {
            font-size: 0.6875rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }

        .stat-value {
            font-size: 0.9375rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .stat-value.highlight-success { color: var(--success); }
        .stat-value.highlight-danger  { color: var(--danger); }
        .stat-value.highlight-warning { color: var(--warning); }

        .stat-status-row {
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .status-dot {
            width: 0.4375rem;
            height: 0.4375rem;
            border-radius: 50%;
            background: #cbd5e1;
            flex-shrink: 0;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }

        /* ========== Card ========== */
        .card {
            width: 100%;
            background: var(--card);
            border-radius: 0.625rem;
            border: 1px solid var(--border);
            margin-top: 0.75rem;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            padding: 0.625rem 0.875rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 0.9375rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .card-title svg {
            width: 1.0625rem;
            height: 1.0625rem;
            color: var(--text-muted);
        }

        .card-title .count {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-left: 0.25rem;
        }

        /* ========== Toolbar ========== */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            align-items: center;
        }

        /* ========== Buttons ========== */
        button {
            border: none;
            cursor: pointer;
            font: inherit;
            transition: all 0.15s;
        }

        .btn {
            padding: 0.3125rem 0.625rem;
            border-radius: 0.375rem;
            font-size: 0.8125rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            letter-spacing: -0.005em;
        }

        .btn-secondary {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-secondary:hover {
            background: var(--hover);
            border-color: #cbd5e1;
        }

        .btn-secondary.active {
            background: var(--primary);
            color: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 1px 2px rgba(37, 99, 235, 0.2);
        }

        .btn-icon {
            padding: 0.3125rem;
            background: none;
            color: var(--text-muted);
            border-radius: 0.375rem;
        }

        .btn-icon:hover {
            color: var(--text);
            background: var(--hover);
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.125rem;
            height: 1.125rem;
            padding: 0 0.3125rem;
            border-radius: 999px;
            font-size: 0.6875rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.01em;
        }

        .badge.danger {
            background: var(--danger);
            color: #ffffff;
        }

        /* ========== Input ========== */
        input[type="text"] {
            padding: 0.3125rem 0.625rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            font: inherit;
            font-size: 0.8125rem;
            width: 220px;
            background: var(--card);
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        /* ========== Table ========== */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 1200px;
            table-layout: fixed;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 0.5rem 0.625rem;
            text-align: left;
            font-size: 0.6875rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: #fafbfc;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            border-bottom: 2px solid var(--border);
            transition: background 0.1s, color 0.1s;
        }

        th:hover {
            background: #f1f5f9;
            color: var(--text-secondary);
        }

        th.sortable::after {
            content: ' \21C5';
            opacity: 0.2;
            font-size: 0.625rem;
        }

        th.sorted-asc::after {
            content: ' \2191';
            opacity: 1;
            color: var(--primary);
        }

        th.sorted-desc::after {
            content: ' \2193';
            opacity: 1;
            color: var(--primary);
        }

        td {
            padding: 0.5625rem 0.625rem;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.8125rem;
            vertical-align: middle;
        }

        tbody tr {
            transition: background 0.1s;
        }

        tbody tr:nth-child(even) td {
            background: #fafbfc;
        }

        tbody tr:hover td {
            background: #eef2ff !important;
        }

        tbody tr.issue td {
            background: #fef2f2 !important;
        }

        tbody tr.issue:nth-child(even) td {
            background: #fef5f5 !important;
        }

        tbody tr.issue:hover td {
            background: #fee2e2 !important;
        }

        .text-right {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .text-mono {
            font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace;
            font-size: 0.75rem;
        }

        .name-cell {
            min-width: 280px;
        }

        .primary-text {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 600;
            font-size: 0.8125rem;
            letter-spacing: -0.005em;
        }

        .subtext {
            display: block;
            margin-top: 0.125rem;
            color: var(--text-muted);
            font-size: 0.6875rem;
            line-height: 1.3;
        }

        .nowrap {
            white-space: nowrap;
        }

        .metric {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.0625rem;
            font-variant-numeric: tabular-nums;
        }

        /* ========== Name with hash ========== */
        .name-hash {
            font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace;
            font-size: 0.625rem;
            color: var(--text-muted);
            display: block;
            margin-top: 0.125rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ========== Speed indicator ========== */
        .speed-value {
            font-weight: 600;
            font-size: 0.8125rem;
            letter-spacing: -0.005em;
        }

        .speed-value.high  { color: var(--success); }
        .speed-value.mid   { color: var(--warning); }
        .speed-value.low   { color: var(--text-secondary); }
        .speed-value.zero  { color: var(--text-muted); }

        /* ========== Ratio Progress Bar ========== */
        .ratio-cell {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.4375rem;
        }

        .ratio-bar-wrap {
            width: 2.75rem;
            height: 0.3125rem;
            background: #f1f5f9;
            border-radius: 999px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .ratio-bar-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 0.4s ease;
            min-width: 0;
        }

        .ratio-bar-fill.high  { background: linear-gradient(90deg, #059669, #10b981); }
        .ratio-bar-fill.mid   { background: linear-gradient(90deg, #d97706, #f59e0b); }
        .ratio-bar-fill.low   { background: linear-gradient(90deg, #dc2626, #ef4444); }

        .ratio-value {
            font-weight: 600;
            font-size: 0.8125rem;
            letter-spacing: -0.01em;
            min-width: 2.75rem;
        }

        .ratio-value.high { color: var(--success); }
        .ratio-value.mid  { color: var(--warning); }
        .ratio-value.low  { color: var(--danger); }

        /* ========== Status Badge ========== */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.1875rem 0.5rem;
            border-radius: 999px;
            font-size: 0.6875rem;
            font-weight: 600;
            letter-spacing: -0.005em;
        }

        .status-badge.ok {
            background: var(--success-light);
            color: var(--success);
        }

        .status-badge.warning {
            background: var(--warning-light);
            color: var(--warning);
        }

        .status-badge.error {
            background: var(--danger-light);
            color: var(--danger);
        }

        .status-icon {
            width: 0.75rem;
            height: 0.75rem;
            flex-shrink: 0;
        }

        .status-cell {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.125rem;
        }

        .status-detail {
            display: none;
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            z-index: 20;
            width: min(400px, calc(100vw - 2rem));
            padding: 0.875rem;
            border: 1px solid var(--border);
            border-radius: 0.625rem;
            background: var(--card);
            color: var(--text);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12), 0 2px 8px rgba(15, 23, 42, 0.06);
            text-align: left;
            white-space: normal;
        }

        .status-cell:hover .status-detail {
            display: block;
        }

        .status-detail-title {
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text);
        }

        .status-detail-line {
            display: block;
            margin-top: 0.25rem;
            color: var(--text-secondary);
            font-size: 0.8125rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .status-detail-error {
            margin-top: 0.625rem;
            padding: 0.5625rem 0.625rem;
            border-radius: 0.375rem;
            background: var(--danger-light);
            color: #991b1b;
            font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace;
            font-size: 0.75rem;
            line-height: 1.45;
            word-break: break-word;
            border: 1px solid #fecaca;
        }

        /* ========== Empty State ========== */
        .empty {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-icon {
            width: 3.5rem;
            height: 3.5rem;
            margin: 0 auto 1.25rem;
            opacity: 0.3;
        }

        .empty h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.375rem;
            color: var(--text);
        }

        .empty p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* ========== Modal ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--card);
            border-radius: 0.75rem;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(15, 23, 42, 0.18);
            animation: modalIn 0.2s ease-out;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.96) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 1.0625rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .modal-body {
            padding: 1.25rem 1.5rem;
            overflow-y: auto;
            flex: 1;
        }

        .config-row {
            display: grid;
            grid-template-columns: 2fr 3fr;
            gap: 1rem;
            padding: 0.625rem 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.875rem;
        }

        .config-row:last-child {
            border-bottom: none;
        }

        .config-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .config-value {
            font-weight: 600;
            word-break: break-word;
            color: var(--text);
        }

        /* ========== SVG resets ========== */
        svg {
            width: 1rem;
            height: 1rem;
            flex-shrink: 0;
        }

        /* ========== Responsive ========== */
        @media (max-width: 1200px) {
            .header-container {
                flex-direction: column;
                align-items: stretch;
            }

            .stats {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 0.75rem;
            }

            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.375rem;
            }

            .stat {
                padding: 0.375rem 0.5rem;
            }

            .stat-label {
                font-size: 0.625rem;
            }

            .stat-value {
                font-size: 0.8125rem;
            }

            .main-container {
                padding: 0.5rem 0.5rem 0.5rem;
            }

            input[type="text"] {
                width: 100%;
            }

            .text-mono,
            .hash-col,
            .tracker,
            .optional-col {
                display: none;
            }

            .config-row {
                grid-template-columns: 1fr;
                gap: 0.125rem;
            }

            .ratio-bar-wrap {
                width: 2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="header-brand">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5M12 3.75v16.5"/>
                    <circle cx="12" cy="12" r="0.75" fill="currentColor" stroke="none"/>
                    <circle cx="12" cy="5.25" r="0.5" fill="currentColor" stroke="none"/>
                    <circle cx="18.75" cy="12" r="0.5" fill="currentColor" stroke="none"/>
                    <circle cx="12" cy="18.75" r="0.5" fill="currentColor" stroke="none"/>
                    <circle cx="5.25" cy="12" r="0.5" fill="currentColor" stroke="none"/>
                </svg>
                <h1>OpenPT 监控面板</h1>
            </div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-icon seeds">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5m6 4.125l2.25 2.25m0 0l2.25 2.25M12 13.875l2.25-2.25M12 13.875l-2.25 2.25M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span class="stat-label">活跃种子</span>
                        <span class="stat-value" id="active">0</span>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-icon issues">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span class="stat-label">异常种子</span>
                        <span class="stat-value" id="issues">0</span>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-icon speed">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span class="stat-label">上传速度</span>
                        <span class="stat-value highlight-success" id="speed">0 B/s</span>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-icon upload">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span class="stat-label">总上传量</span>
                        <span class="stat-value" id="uploaded">0 B</span>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-icon clock">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span class="stat-label">下次上报</span>
                        <span class="stat-value" id="next-report">暂无</span>
                    </div>
                </div>
                <div class="stat">
                    <div class="stat-icon status" id="status-icon">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5.636 5.636a9 9 0 1012.728 0M12 3v4.5"/>
                        </svg>
                    </div>
                    <div class="stat-body">
                        <span class="stat-label">状态</span>
                        <div class="stat-status-row">
                            <span class="status-dot" id="dot"></span>
                            <span class="stat-value" id="status-text" style="font-size:0.8125rem;">连接中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="card">
            <div class="card-header">
                <span class="card-title">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 010 3.75H5.625a1.875 1.875 0 010-3.75z"/>
                    </svg>
                    种子列表
                    <span class="count" id="list-count">0 个</span>
                </span>
                <div class="toolbar">
                    <button class="btn btn-secondary active" data-filter="all">全部</button>
                    <button class="btn btn-secondary" data-filter="issue">
                        异常<span class="badge danger" id="badge">0</span>
                    </button>
                    <button class="btn btn-secondary" data-filter="ok">正常</button>
                    <button class="btn-icon" id="config-btn" title="查看配置">
                        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                    </button>
                    <input type="text" id="search" placeholder="搜索种子...">
                </div>
            </div>
            <div id="table-wrapper" class="table-wrapper">
                <table>
                    <colgroup>
                        <col style="width: 300px;">
                        <col style="width: 105px;">
                        <col style="width: 95px;">
                        <col style="width: 105px;">
                        <col style="width: 90px;">
                        <col style="width: 80px;">
                        <col style="width: 120px;">
                        <col style="width: 145px;">
                        <col class="optional-col" style="width: 85px;">
                        <col class="tracker" style="width: 155px;">
                        <col class="hash-col" style="width: 120px;">
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="sortable" data-sort="name">名称</th>
                            <th class="sortable text-right" data-sort="failures">状态</th>
                            <th class="sortable text-right" data-sort="speed_bps">速度</th>
                            <th class="sortable text-right" data-sort="uploaded">已上传</th>
                            <th class="sortable text-right" data-sort="size">大小</th>
                            <th class="sortable text-right" data-sort="peers_total">Peers</th>
                            <th class="sortable text-right" data-sort="ratio">分享率</th>
                            <th class="sortable text-right" data-sort="next_announce_ts">下次上报</th>
                            <th class="sortable text-right optional-col" data-sort="last_interval_seconds">间隔</th>
                            <th class="sortable tracker" data-sort="tracker_host">Tracker</th>
                            <th class="sortable hash-col" data-sort="info_hash">Info Hash</th>
                        </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
            <div id="empty" class="empty" style="display: none;">
                <svg class="empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z"/>
                </svg>
                <h3 id="empty-title">暂无种子</h3>
                <p id="empty-desc">请将 .torrent 文件放入 torrents 目录</p>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">当前配置</span>
                <button class="btn-icon" id="close">
                    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="config"></div>
        </div>
    </div>

    <script>
    let data = [];
    let sortKey = 'name';
    let sortAsc = true;
    let filter = 'all';
    let query = '';
    let es = null;
    const rowCache = new Map();

    const fmt = {
        bytes: n => {
            n = Number(n || 0);
            if (n === 0) return '0 B';
            const u = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(n) / Math.log(1024));
            return (n / Math.pow(1024, i)).toFixed(2) + ' ' + u[i];
        },
        speed: n => fmt.bytes(n) + '/s',
        ratio: n => Number(n || 0).toFixed(3),
        time: s => {
            if (!s) return '未上报';
            const d = new Date(s);
            if (Number.isNaN(d.getTime())) return '未知';
            return d.toLocaleString('zh-CN', { hour12: false });
        },
        relative: s => {
            if (!s) return '暂无';
            const d = new Date(s);
            if (Number.isNaN(d.getTime())) return '未知';
            const diff = d.getTime() - Date.now();
            const abs = Math.abs(diff);
            const sec = Math.round(abs / 1000);
            const min = Math.round(sec / 60);
            const hour = Math.round(min / 60);
            const text = hour >= 1 ? hour + ' 小时' : min >= 1 ? min + ' 分钟' : sec + ' 秒';
            return diff >= 0 ? text + '后' : text + '前';
        },
        duration: seconds => {
            seconds = Number(seconds || 0);
            if (seconds <= 0) return '-';
            if (seconds < 60) return seconds + ' 秒';
            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            if (min < 60) return sec ? min + ' 分 ' + sec + ' 秒' : min + ' 分';
            const hour = Math.floor(min / 60);
            const rest = min % 60;
            return rest ? hour + ' 小时 ' + rest + ' 分' : hour + ' 小时';
        },
        event: event => {
            if (event === 'started') return '启动上报';
            if (event === 'stopped') return '停止上报';
            if (event === 'completed') return '完成上报';
            return '常规上报';
        }
    };

    const esc = s => {
        const div = document.createElement('div');
        div.textContent = String(s || '');
        return div.innerHTML;
    };

    // 速度颜色分级
    const speedClass = bps => {
        if (bps <= 0) return 'zero';
        if (bps < 10240) return 'low';
        if (bps < 102400) return 'mid';
        return 'high';
    };

    // 分享率颜色和进度条分级
    const ratioGrade = r => {
        if (r >= 1) return { cls: 'high', pct: Math.min(100, (r / 2) * 100) };
        if (r >= 0.5) return { cls: 'mid', pct: Math.min(100, r * 100) };
        return { cls: 'low', pct: Math.max(0, r * 100) };
    };

    const compareRows = (a, b) => {
        let va = a[sortKey] ?? '', vb = b[sortKey] ?? '';
        if (typeof va === 'string') {
            va = va.toLowerCase();
            vb = String(vb).toLowerCase();
        }
        const primary = va < vb ? -1 : va > vb ? 1 : 0;
        if (primary !== 0) return primary * (sortAsc ? 1 : -1);

        const nameA = String(a.name || '').toLowerCase();
        const nameB = String(b.name || '').toLowerCase();
        if (nameA !== nameB) return nameA < nameB ? -1 : 1;
        return String(a.info_hash || '').localeCompare(String(b.info_hash || ''));
    };

    const rowHTML = t => {
        const ratioInfo = ratioGrade(t.ratio);
        const speedCls = speedClass(t.speed_bps);
        const statusClass = t.has_issue ? (t.failures > 0 ? 'error' : 'warning') : 'ok';
        const peersTotal = (t.seeders || 0) + (t.leechers || 0);
        const trackerOrdinal = t.tracker_count > 0 ? ((t.tracker_index || 0) + 1) + '/' + t.tracker_count : '-';

        let statusText = '正常';
        let statusHint = '最近一次 Tracker 响应正常';

        if (t.has_issue) {
            if (t.failures > 0) {
                statusText = '失败 ' + t.failures;
                statusHint = t.issue_reason || '连续失败 ' + t.failures + ' 次';
            } else {
                statusText = '异常';
                statusHint = t.issue_reason || '异常';
            }
        }

        const detailRows = [
            '状态：' + statusHint,
            '上次上报：' + fmt.time(t.last_announce_at) + '（' + fmt.relative(t.last_announce_at) + '）',
            '下次上报：' + fmt.time(t.next_announce_at) + '（' + fmt.relative(t.next_announce_at) + '）',
            '上报类型：' + fmt.event(t.next_event) + '，间隔：' + fmt.duration(t.last_interval_seconds),
            'Tracker：' + (t.tracker_host || '-') + '（' + trackerOrdinal + '）',
            'Peers：做种 ' + (t.seeders || 0) + ' / 下载 ' + (t.leechers || 0)
        ];

        const icon = '<svg class="status-icon" fill="currentColor" viewBox="0 0 20 20">'
            + (t.has_issue
                ? '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>'
                : '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>')
            + '</svg>';

        return '<td class="name-cell" title="' + esc(t.name) + '">'
                + '<span class="primary-text">' + esc(t.name) + '</span>'
                + '<span class="subtext">Tracker ' + esc(trackerOrdinal) + ' &middot; ' + esc(fmt.event(t.next_event)) + '</span>'
            + '</td>'
            + '<td class="text-right">'
                + '<span class="status-cell">'
                    + '<span class="status-badge ' + statusClass + '">'
                        + icon + esc(statusText)
                    + '</span>'
                    + '<span class="subtext">' + esc(t.failures > 0 ? '重试 ' + fmt.relative(t.next_announce_at) : fmt.event(t.next_event)) + '</span>'
                    + '<span class="status-detail">'
                        + '<span class="status-detail-title">' + esc(t.name) + '</span>'
                        + detailRows.map(row => '<span class="status-detail-line">' + esc(row) + '</span>').join('')
                        + (t.last_error ? '<span class="status-detail-error">' + esc(t.last_error) + '</span>' : '')
                    + '</span>'
                + '</span>'
            + '</td>'
            + '<td class="text-right"><span class="speed-value ' + speedCls + '">' + fmt.speed(t.speed_bps) + '</span></td>'
            + '<td class="text-right">' + fmt.bytes(t.uploaded) + '</td>'
            + '<td class="text-right">' + fmt.bytes(t.size) + '</td>'
            + '<td class="text-right">'
                + '<span class="metric">'
                    + '<span>' + peersTotal + '</span>'
                    + '<span class="subtext">S ' + (t.seeders || 0) + ' / L ' + (t.leechers || 0) + '</span>'
                + '</span>'
            + '</td>'
            + '<td class="text-right">'
                + '<div class="ratio-cell">'
                    + '<div class="ratio-bar-wrap"><div class="ratio-bar-fill ' + ratioInfo.cls + '" style="width:' + ratioInfo.pct + '%"></div></div>'
                    + '<span class="ratio-value ' + ratioInfo.cls + '">' + fmt.ratio(t.ratio) + '</span>'
                + '</div>'
            + '</td>'
            + '<td class="text-right">'
                + '<span class="metric">'
                    + '<span class="nowrap">' + esc(fmt.relative(t.next_announce_at)) + '</span>'
                    + '<span class="subtext">' + esc(fmt.time(t.next_announce_at)) + '</span>'
                + '</span>'
            + '</td>'
            + '<td class="text-right optional-col">' + esc(fmt.duration(t.last_interval_seconds)) + '</td>'
            + '<td class="tracker" title="' + esc(t.tracker_host) + '">'
                + '<span class="primary-text">' + esc(t.tracker_host || '-') + '</span>'
                + '<span class="subtext">' + esc(trackerOrdinal) + '</span>'
            + '</td>'
            + '<td class="text-mono hash-col" title="' + esc(t.info_hash) + '">'
                + '<span class="primary-text">' + esc(t.info_hash.slice(0, 16)) + '...</span>'
            + '</td>';
    };

    const render = () => {
        let filtered = data.filter(t => {
            const keyword = query.toLowerCase();
            const haystack = (t.name + ' ' + t.info_hash + ' ' + t.tracker_host + ' ' + t.issue_reason).toLowerCase();
            if (query && !haystack.includes(keyword)) return false;
            if (filter === 'issue') return t.has_issue;
            if (filter === 'ok') return !t.has_issue;
            return true;
        });

        filtered.sort(compareRows);

        const tbody = document.getElementById('tbody');
        const empty = document.getElementById('empty');
        const wrapper = document.getElementById('table-wrapper');
        const listCount = document.getElementById('list-count');

        if (filtered.length === 0) {
            wrapper.style.display = 'none';
            empty.style.display = 'block';
            listCount.textContent = '0 个';
            rowCache.forEach(row => row.remove());
            rowCache.clear();
            const title = document.getElementById('empty-title');
            const desc = document.getElementById('empty-desc');
            if (filter === 'issue') {
                title.textContent = '没有异常种子';
                desc.textContent = '所有种子运行正常';
            } else if (filter === 'ok') {
                title.textContent = '没有正常种子';
                desc.textContent = '所有种子都存在异常';
            } else if (query) {
                title.textContent = '未找到匹配';
                desc.textContent = '尝试其他关键词';
            } else {
                title.textContent = '暂无种子';
                desc.textContent = '请将 .torrent 文件放入 torrents 目录';
            }
            return;
        }

        wrapper.style.display = 'block';
        empty.style.display = 'none';
        listCount.textContent = filtered.length + ' 个';

        const visibleHashes = new Set();
        filtered.forEach(t => {
            visibleHashes.add(t.info_hash);
            let row = rowCache.get(t.info_hash);
            if (!row) {
                row = document.createElement('tr');
                row.dataset.hash = t.info_hash;
                rowCache.set(t.info_hash, row);
            }

            row.className = t.has_issue ? 'issue' : '';
            const nextHTML = rowHTML(t);
            if (row.dataset.html !== nextHTML) {
                row.innerHTML = nextHTML;
                row.dataset.html = nextHTML;
            }
            tbody.appendChild(row);
        });

        rowCache.forEach((row, hash) => {
            if (!visibleHashes.has(hash)) {
                row.remove();
                rowCache.delete(hash);
            }
        });
    };

    const update = resp => {
        data = (resp.torrents || []).map(t => ({
            ...t,
            peers_total: (t.seeders || 0) + (t.leechers || 0),
            last_announce_ts: t.last_announce_at ? new Date(t.last_announce_at).getTime() : 0,
            next_announce_ts: t.next_announce_at ? new Date(t.next_announce_at).getTime() : Number.MAX_SAFE_INTEGER
        }));
        const issues = data.filter(t => t.has_issue).length;
        const totalSpeed = data.reduce((s, t) => s + t.speed_bps, 0);
        const totalUploaded = data.reduce((s, t) => s + t.uploaded, 0);
        const nextTs = data.reduce((min, t) => Math.min(min, t.next_announce_ts || Number.MAX_SAFE_INTEGER), Number.MAX_SAFE_INTEGER);

        document.getElementById('active').textContent = data.length;
        const issuesEl = document.getElementById('issues');
        issuesEl.textContent = issues;
        issuesEl.className = 'stat-value' + (issues > 0 ? ' highlight-danger' : '');
        document.getElementById('speed').textContent = fmt.speed(totalSpeed);
        document.getElementById('uploaded').textContent = fmt.bytes(totalUploaded);
        document.getElementById('next-report').textContent = nextTs === Number.MAX_SAFE_INTEGER ? '暂无' : fmt.relative(new Date(nextTs).toISOString());
        document.getElementById('badge').textContent = issues;

        render();
    };

    const connect = () => {
        if (es) es.close();
        es = new EventSource('/api/events');

        es.onopen = () => {
            document.getElementById('dot').classList.add('active');
            document.getElementById('status-text').textContent = '已连接';
            const iconEl = document.getElementById('status-icon');
            if (iconEl) iconEl.className = 'stat-icon status-active';
        };

        es.onmessage = e => {
            try {
                update(JSON.parse(e.data));
            } catch (err) {
                console.error(err);
            }
        };

        es.onerror = () => {
            document.getElementById('dot').classList.remove('active');
            document.getElementById('status-text').textContent = '重连中...';
            const iconEl = document.getElementById('status-icon');
            if (iconEl) iconEl.className = 'stat-icon status';
        };
    };

    const loadConfig = async () => {
        try {
            const res = await fetch('/api/config');
            const json = await res.json();
            document.getElementById('config').innerHTML = json.items.map(item =>
                '<div class="config-row">'
                    + '<div class="config-label">' + esc(item.label) + '</div>'
                    + '<div class="config-value">' + esc(item.value) + '</div>'
                + '</div>'
            ).join('');
        } catch (err) {
            console.error(err);
        }
    };

    // Event listeners
    document.querySelectorAll('[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filter = btn.dataset.filter;
            render();
        });
    });

    document.querySelectorAll('[data-sort]').forEach(th => {
        th.addEventListener('click', () => {
            const key = th.dataset.sort;
            if (sortKey === key) {
                sortAsc = !sortAsc;
            } else {
                sortKey = key;
                sortAsc = true;
            }
            document.querySelectorAll('th').forEach(t => t.classList.remove('sorted-asc', 'sorted-desc'));
            th.classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');
            render();
        });
    });

    document.getElementById('search').addEventListener('input', e => {
        query = e.target.value;
        render();
    });

    document.getElementById('config-btn').addEventListener('click', () => {
        loadConfig();
        document.getElementById('modal').classList.add('active');
    });

    document.getElementById('close').addEventListener('click', () => {
        document.getElementById('modal').classList.remove('active');
    });

    document.getElementById('modal').addEventListener('click', e => {
        if (e.target === e.currentTarget) {
            e.currentTarget.classList.remove('active');
        }
    });

    // Init
    connect();
    </script>
</body>
</html>
